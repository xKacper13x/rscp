plugins: 
  - {name: traversability,        type: "costmap_2d::StaticLayer"} 
  - {name: inflation,             type: "costmap_2d::InflationLayer"}
global_frame_id: map
transform_tolerance: 4
update_frequency: 10
width: 30
height: 30
resolution: 0.05

traversability:
  map_topic: /global_costmap
  first_map_only: false
  subscribe_to_updates: true

inflation:
  inflation_radius: 0.0
  cost_scaling_factor: 8.0
